url: https://bradleylab.github.io/leafwax/

title: leafwax
description: Bayesian inversion of leaf wax hydrogen isotopes to precipitation isotopes.

template:
  bootstrap: 5

navbar:
  title: leafwax
  type: default
  left:
    - icon: fa-home
      href: index.html
    - text: "Get started"
      href: articles/paleo-record-workflow.html
    - text: "Reference"
      href: reference/index.html
    - text: "News"
      href: news/index.html
  right:
    - icon: fab fa-github
      href: https://github.com/bradleylab/leafwax
      aria-label: GitHub

home:
  sidebar:
    structure: [links, license, citation, authors, dev, toc]
  links:
    - text: Report a bug
      href: https://github.com/bradleylab/leafwax/issues

reference:
  - title: "Inversion"
    desc: "Reconstruct d2H_precip from leaf-wax d2H_wax."
    contents:
      - invert_d2H
      - invert_d2H_ensemble

  - title: "Paleo-record workflow"
    desc: "Within-record sigma_within, slope, change detection, claim taxonomy."
    contents:
      - estimate_sigma_within
      - local_effective_slope
      - estimate_temporal_autocorrelation
      - detect_change
      - assess_claim

  - title: "Models"
    desc: "Routing and metadata for the 14 v10 model variants."
    contents:
      - available_models
      - get_all_model_metadata
      - get_model_info
      - list_models
      - load_posteriors
      - load_model_posteriors
      - select_best_model
      - select_best_model_from_flags

  - title: "Datasets"
    contents:
      - example_data
      - model_metadata

  - title: "Lower-level / legacy helpers"
    desc: "Internal-style exports retained from v0.1.0 (data caching, lookup tables, batch processing, validation) and the lower-level invert_d2h() function. Most users will not call these directly."
    contents:
      - invert_d2h
      - batch_invert_d2h
      - batch_predict
      - predict_d2h_precip
      - validate_inputs
      - validate_model_inputs
      - validate_lookup_table
      - get_model_parameters
      - get_model_recommendations
      - detect_model_capabilities
      - list_model_names
      - leafwax_config
      - leafwax_set_config
      - monitor_memory
      - benchmark_lookup
      - compare_models
      - create_lookup_table
      - create_regional_lookup
      - cache_all_lookup_tables
      - use_lookup_if_available
      - get_spatial_params
      - generate_fibonacci_sphere
      - generate_global_grid
      - predict_spatial_mpp
      - predict_spatial_dual_gp
      - download_model_data
      - check_data_cache
      - clear_data_cache
      - clear_download_cache
      - get_cache_dir
      - get_cache_info
      - get_data_path
      - get_data_url
      - list_cached_models
      - setup_leafwax_data
      - verify_data_integrity

articles:
  - title: "Workflow"
    contents:
      - paleo-record-workflow

news:
  releases:
    - text: "Version 0.2.0"
      href: https://github.com/bradleylab/leafwax/releases/tag/v0.2.0

development:
  mode: auto

authors:
  Alex Bradley:
    href: https://eps.wustl.edu/people/alex-bradley

footer:
  structure:
    left: developed_by
    right: built_with
