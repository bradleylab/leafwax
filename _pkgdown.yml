url: https://bradleylab.github.io/leafwax/

title: leafwax
description: Bayesian inversion of leaf wax hydrogen isotopes to precipitation isotopes.

template:
  bootstrap: 5

navbar:
  title: leafwax
  type: default
  left:
    - icon: fa-home
      href: index.html
      aria-label: "Home"
    - text: "Get started"
      href: articles/paleo-record-workflow.html
    - text: "Reference"
      href: reference/index.html
    - text: "News"
      href: news/index.html
  right:
    - icon: fab fa-github
      href: https://github.com/bradleylab/leafwax
      aria-label: GitHub

home:
  sidebar:
    structure: [links, license, citation, authors, dev, toc]

reference:
  - title: "Inversion"
    desc: "Reconstruct d2H_precip from leaf-wax d2H_wax."
    contents:
      - invert_d2H
      - invert_d2H_ensemble

  - title: "Paleo-record workflow"
    desc: "Local slope, change detection, claim taxonomy."
    contents:
      - local_effective_slope
      - estimate_temporal_autocorrelation
      - detect_change
      - assess_claim

  - title: "Models"
    desc: "Routing and metadata for the 14 v10 model variants."
    contents:
      - available_models
      - get_all_model_metadata
      - get_model_info
      - list_models
      - load_posteriors
      - select_best_model_from_flags

  - title: "Datasets"
    contents:
      - example_data

  - title: "Lower-level helpers"
    desc: "Internal-style exports (data caching, batch processing, validation) and the lower-level invert_d2h() function. Most users will not call these directly."
    contents:
      - invert_d2h
      - batch_predict
      - predict_d2h_precip
      - validate_inputs
      - validate_model_inputs
      - get_model_parameters
      - detect_model_capabilities
      - list_model_names
      - leafwax_config
      - leafwax_set_config
      - compare_models
      - generate_fibonacci_sphere
      - predict_spatial_dual_gp
      - predict_one_gp_mpp
      - download_model_data
      - check_data_cache
      - clear_download_cache
      - get_cache_dir
      - get_cache_info
      - get_data_path
      - get_data_url
      - list_cached_models
      - download_with_progress
      - generate_model_description
      - get_cache_files
      - get_data_manifest
      - get_url_config
      - process_parallel
      - process_sequential

  - title: "S3 print methods"
    desc: "Pretty-printing for the package's own S3 classes."
    contents:
      - print.leafwax_posterior

  - title: "Package"
    contents:
      - leafwax-package

articles:
  - title: "Workflow"
    contents:
      - paleo-record-workflow

news:
  releases:
    - text: "Version 0.2.2"
      href: https://github.com/bradleylab/leafwax/releases/tag/v0.2.2

development:
  mode: auto

authors:
  Alex Bradley:
    href: https://eeps.washu.edu/people/alexander-s-bradley

footer:
  structure:
    left: developed_by
    right: built_with
